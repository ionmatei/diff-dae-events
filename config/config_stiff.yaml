dae_solver:
  atol: 0.001
  rtol: 0.001
  start_time: 0.0
  stop_time: 0.02
  ncp: 200
  dae_specification_file: dae_examples/dae_specification_stiff.json
  
optimizer:
  method: trapezoidal
  step_size: 100 # 50
  opt_params:
    - R1
    - R2
  loss_type: mean
  max_iterations: 500
  tol: 0.0001
  max_iterations_krylov: 30
  tol_krylov: 0.0001
  print_every: 20
  device: gpu
  gpu_memory_fraction: 0.9
  sequential_fallback:
    enable: False
    threshold: 500

augmented_lagrangian:
  # Penalty parameter for augmented Lagrangian
  penalty_mu: 0.000001
  
  # Step size for primal variable (states/algebraic) update
  alpha_w: 0.1
  
  # Step size for parameter update
  alpha_theta: 0.1
  
  # Feasibility tolerance for DAE residual
  epsilon_feas: 1.0e-6
  
  # Adjoint tolerance (unused since Krylov refinement not implemented)
  epsilon_adj: 1.0e-6
  
  # Whether to reset states via DAE solver at each iteration
  use_dae_reset: true
  
  # Number of primal steps per iteration
  n_primal_steps: 5


