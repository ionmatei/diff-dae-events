dae_solver:
  atol: 0.0001
  rtol: 0.0001
  start_time: 0.0
  stop_time: 150.0
  ncp: 7000
  dae_specification_file: dae_examples/dae_specification_smooth.json
  
optimizer:
  step_size: 0.001
  opt_params:
    - C1_C
    - C2_C
    - C3_C
    - C4_C
    - C5_C
    - L1_L
    - L2_L
  max_iterations: 200
  tol: 0.00001
  print_every: 20
  device: cpu
  gpu_memory_fraction: 0.9


