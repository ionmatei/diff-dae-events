dae_solver:
  atol: 0.0001
  rtol: 0.0001
  start_time: 0.0
  stop_time: 60.0
  ncp: 1000
  dae_specification_file: dae_examples/dae_specification_smooth.json
  
optimizer:
  discretization_method: bdf6  # backward_euler, trapezoidal, bdf2, bdf3, bdf4, bdf5, bdf6
  algorithm:
    type: "ADAM"  # "SGD" or "ADAM"
    params:
      step_size: 0.01
      # Adam-specific parameters (ignored for SGD):
      beta1: 0.9
      beta2: 0.999
      epsilon: 1.0e-8
  opt_params:
    - C1_C
    - C2_C
    - C3_C
    - C4_C
    - C5_C
    - L1_L
    - L2_L
  loss_type: mean
  max_iterations: 200
  tol: 0.00000001
  print_every: 1
  device: cpu
  gpu_memory_fraction: 0.9

