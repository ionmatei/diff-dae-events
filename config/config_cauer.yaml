dae_solver:
  atol: 0.0001
  rtol: 0.0001
  start_time: 0.0
  stop_time: 150.0
  ncp: 5000
  dae_specification_file: dae_examples/dae_specification_smooth.json
  
optimizer:
  discretization_method: bdf6  # backward_euler, trapezoidal, bdf2, bdf3, bdf4, bdf5, bdf6
  algorithm:
    type: "SGD"  # "SGD" or "ADAM"
    params:
      step_size: 0.003
      # Adam-specific parameters (ignored for SGD):
      beta1: 0.9
      beta2: 0.999
      epsilon: 1.0e-8
  opt_params:
    - C1_C
    - C2_C
    - C3_C
    - C4_C
    - C5_C
    - L1_L
    - L2_L
  loss_type: mean
  max_iterations: 50
  tol: 0.001
  max_iterations_krylov: 30
  tol_krylov: 0.0001
  print_every: 10
  device: cpu
  gpu_memory_fraction: 0.9
  sequential_fallback:
    enable: False
    threshold: 500

