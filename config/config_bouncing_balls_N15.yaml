dae_solver:
  atol: 1.0e-8
  rtol: 1.0e-8
  start_time: 0.0
  stop_time: 1.9
  ncp: 500
  dae_specification_file: dae_examples/dae_specification_bouncing_balls_N15.yaml

optimizer:
  discretization_method: bdf6  # backward_euler, trapezoidal, bdf2, bdf3, bdf4, bdf5, bdf6
  algorithm:
    type: "ADAM"  # "SGD" or "ADAM"
    params:
      step_size: 0.01
      # Adam-specific parameters (ignored for SGD):
      beta1: 0.9
      beta2: 0.999
      epsilon: 1.0e-8
  blend_sharpness: 300
  prediction_method: sigmoid  # 'sigmoid', 'linear', or 'hermite'
  max_segments: 44
  downsample_segments: true # takes every segment and interpolate it to max_points_per_segment
  all_segments: false  # interpolates all segments if true, only the ones that have more than  max_points_per_segment if false
  max_points_per_segment: 25 # maximum number of points per segment after downsampling
  sim_top_time: true # if true adjust the end time based on the simulation end time, and not on the target time (limits the Zeno effect on the loss function)
  opt_params:
    - g
    - e_g
    - e_b
  max_iterations: 600
  tol: 1.0e-6
  print_every: 1
  max_blocks: 90 # N segments + (N-1) events = 2N - 1 blocks; bumped for 25-ball model (more events)
  max_targets: 600 # 1.2 * ncp
  device: cpu
  gpu_memory_fraction: 0.9
generate_animation: false
