dae_solver:
  atol: 1.0e-6
  rtol: 1.0e-6
  start_time: 0.0
  stop_time: 2.0
  ncp: 200
  dae_specification_file: dae_examples/dae_specification_bouncing_ball.json
  
optimizer:
  discretization_method: bdf6  # backward_euler, trapezoidal, bdf2, bdf3, bdf4, bdf5, bdf6
  algorithm:
    type: "ADAM"  # "SGD" or "ADAM"
    params:
      step_size: 0.005
      # Adam-specific parameters (ignored for SGD):
      beta1: 0.9
      beta2: 0.999
      epsilon: 1.0e-8
  blend_sharpness: 300
  prediction_method: sigmoid  # 'sigmoid', 'linear', or 'hermite'
  max_segments: 3
  max_points_per_segment: 200
  sim_top_time: true
  opt_params:
    - g
    - e

  max_iterations: 500
  tol: 1.0e-8
  print_every: 10
  max_blocks: 20
  max_targets: 600 # 1.2 * ncp
  downsample_segments: true
  all_segments: true
  device: cpu
  gpu_memory_fraction: 0.9


