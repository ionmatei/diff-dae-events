# Benchmark Configuration File
# This file controls what combinations of devices, problem sizes, and methods to test

# Devices to test (can be 'cpu', 'gpu', or both)
devices:
  - cpu
  - gpu
  # - gpu  # Uncomment to include GPU benchmarks

# NCP (number of collocation points) values to test
ncp_values:
  - 500
  - 1000
  - 2000
  - 4000
  - 6000
  - 8000
  - 10000

# Discretization methods to test
methods:
  - bdf2
  - bdf3
  - bdf4
  - bdf5
  - bdf6
  # - trapezoidal  # Uncomment to include other methods

# Number of runs per configuration
# Set to 1 to run each (device, ncp, approach) combination exactly once
# Set to 3+ for statistical significance (mean ± std)
n_runs: 1

# Path to the optimizer configuration file
# This file contains algorithm settings, tolerances, etc.
optimizer_config_path: config/config_cauer.yaml

# Output directory for results
output_dir: results
